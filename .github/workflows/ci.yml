name: 🎓 Diploma in Test Automation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite"
        required: true
        default: "all"
        type: choice
        options: [all, ui, api]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 📥 Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # 5️⃣ ЗАПУСК ТЕСТОВ (без переопределения репортеров!)
      - name: 🧪 Run tests
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://demowebshop.tricentis.com' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: npx playwright test

      # 5️⃣.5️⃣ ОТЛАДКА allure-results
      - name: 🔍 Debug allure-results
        if: always()
        run: |
          echo "📁 PWD: $(pwd)"
          echo "📁 allure-results exists? $(test -d allure-results && echo 'YES' || echo 'NO')"
          echo "📄 Count result files:"
          ls -la allure-results/*-result.json 2>/dev/null | wc -l || echo "0"
          echo "📄 Sample result file:"
          ls allure-results/*-result.json 2>/dev/null | head -1 | xargs cat 2>/dev/null | head -20 || echo "No files"

      # 6️⃣ ГЕНЕРАЦИЯ ОТЧЁТА
      - name: 📊 Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      # 7️⃣ ДЕПЛОЙ
      - name: 🚀 Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages

      # 8️⃣ АРТЕФАКТЫ
      - name: 📤 Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      # 9️⃣ ПАРСИНГ СТАТИСТИКИ (без jq — чистый grep)
      - name: 📊 Parse test statistics
        if: always()
        id: stats
        run: |
          PASSED=0; FAILED=0; SKIPPED=0; BROKEN=0
          
          if [ -d "allure-results" ]; then
            for file in allure-results/*-result.json; do
              [ -f "$file" ] || continue
              # Парсим status без jq
              STATUS=$(grep -o '"status"[^,}]*' "$file" | grep -o '"[^"]*"$' | tr -d '"' | head -1)
              echo "File: $file → Status: $STATUS"
              case "$STATUS" in
                "passed") PASSED=$((PASSED + 1)) ;;
                "failed") FAILED=$((FAILED + 1)) ;;
                "skipped") SKIPPED=$((SKIPPED + 1)) ;;
                "broken") BROKEN=$((BROKEN + 1)) ;;
              esac
            done
          fi
          
          TOTAL=$((PASSED + FAILED + SKIPPED + BROKEN))
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          
          echo "📊 FINAL: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED, Broken=$BROKEN"

      # 🔟 TELEGRAM
      - name: 📢 Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            <b>🎓 Diploma in Test Automation — ${{ job.status == 'success' && '✅ Успех' || '❌ Провал' }}</b>

            📊 <b>Статистика тестов:</b>
            ▫️ Всего пройдено: <b>${{ steps.stats.outputs.total }}</b>
            ✅ Успешные: <b>${{ steps.stats.outputs.passed }}</b>
            ❌ Провалено: <b>${{ steps.stats.outputs.failed }}</b>
            ⏭️ Пропущено: <b>${{ steps.stats.outputs.skipped }}</b>
            ⚠️ Сломано: <b>${{ steps.stats.outputs.broken }}</b>

            Suite: <code>${{ inputs.suite || 'all' }}</code>
            🌿 Branch: <code>${{ github.ref_name }}</code>
            👤 Author: ${{ github.actor }}

            📊 <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/">Allure Report</a>
            🔧 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">GitHub Actions</a>